name: Build and Deploy to Azure Container Apps

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/intunemanager
  CONTAINER_APP_NAME: ca-intunemanager-prod
  RESOURCE_GROUP: rg-intunemanager-prod

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest   # Linux build for Linux container image

    permissions:
      contents: read
      packages: write        # push to GHCR
      id-token: write        # Azure OIDC / service principal login

    steps:
      - uses: actions/checkout@v4

      # ── Authenticate to GHCR ─────────────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Build and push Docker image ──────────────────────────────────────────
      - name: Set up Docker Buildx (required for GHA cache backend)
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./IntuneManagerUI
          file: ./IntuneManagerUI/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Apply database schema ────────────────────────────────────────────────
      # Using prisma db push for Phase 2 (no migrations folder yet).
      # TODO Phase 3: run `npx prisma migrate dev --name init` locally, commit
      # prisma/migrations/, then switch this step to `prisma migrate deploy`.
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install server dependencies
        working-directory: IntuneManagerUI/server
        run: npm install

      - name: Apply database schema
        working-directory: IntuneManagerUI/server
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma db push --skip-generate --accept-data-loss

      # ── Deploy to Azure Container Apps ───────────────────────────────────────
      # Using az CLI directly instead of azure/container-apps-deploy-action
      # to avoid the Oryx source-build fallback that fires when the action
      # cannot verify deployment success via its internal polling loop.
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            --set-env-vars \
              "AZURE_CLIENT_ID=${{ secrets.AZURE_CLIENT_ID }}" \
              "AZURE_CLIENT_SECRET=${{ secrets.AZURE_CLIENT_SECRET }}" \
              "AZURE_REDIRECT_URI=https://ca-intunemanager-prod.yellowforest-c85ceb60.eastus.azurecontainerapps.io/api/auth/ms-callback"
