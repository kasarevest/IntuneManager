name: Build and Deploy to Azure Container Apps

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/intunemanager
  CONTAINER_APP_NAME: ca-intunemanager-prod
  RESOURCE_GROUP: rg-intunemanager-prod

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest   # Linux build for Linux container image

    permissions:
      contents: read
      packages: write        # push to GHCR
      id-token: write        # Azure OIDC / service principal login

    steps:
      - uses: actions/checkout@v4

      # ── Authenticate to GHCR ─────────────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Build and push Docker image ──────────────────────────────────────────
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./IntuneManagerUI
          file: ./IntuneManagerUI/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Apply database schema ────────────────────────────────────────────────
      # Using prisma db push for Phase 2 (no migrations folder yet).
      # TODO Phase 3: run `npx prisma migrate dev --name init` locally, commit
      # prisma/migrations/, then switch this step to `prisma migrate deploy`.
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: IntuneManagerUI/server/package-lock.json

      - name: Install server dependencies
        working-directory: IntuneManagerUI/server
        run: npm ci

      - name: Apply database schema
        working-directory: IntuneManagerUI/server
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma db push --skip-generate --accept-data-loss

      # ── Deploy to Azure Container Apps ───────────────────────────────────────
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          containerAppName: ${{ env.CONTAINER_APP_NAME }}
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          imageToDeploy: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          registryUrl: ${{ env.REGISTRY }}
          registryUsername: ${{ github.actor }}
          registryPassword: ${{ secrets.GITHUB_TOKEN }}
          targetPort: 8080
          ingress: external
